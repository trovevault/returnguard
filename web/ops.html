<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pearl of the Atlantic Boutique — Returns Ops</title>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #131a26;
    --panel-2: #1a2231;
    --border: #243042;
    --text: #e7edf5;
    --muted: #8a98ac;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
    padding: 20px 28px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(11,15,23,.85); backdrop-filter: blur(8px); z-index: 5;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), #22d3ee);
    display: grid; place-items: center; font-size: 18px;
  }
  .brand h1 { font-size: 18px; margin: 0; letter-spacing: .2px; }
  .brand p { margin: 0; font-size: 12px; color: var(--muted); }
  .stats { display: flex; gap: 10px; align-items: center; }
  .stat {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 14px; min-width: 78px; text-align: center;
  }
  .stat .n { font-size: 20px; font-weight: 700; line-height: 1; }
  .stat .l { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-top: 4px; }
  .stat.deny .n { color: var(--red); }
  .stat.escalate .n { color: var(--amber); }
  .stat.approve .n { color: var(--green); }
  .live { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 rgba(34,197,94,.6); animation: pulse 2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.5);} 70%{box-shadow:0 0 0 8px rgba(34,197,94,0);} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0);} }

  main { padding: 24px 28px; max-width: 1100px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 16px; }

  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; position: relative; overflow: hidden;
    border-left-width: 4px; transition: transform .2s ease;
  }
  .card.v-auto_approve { border-left-color: var(--green); }
  .card.v-escalate { border-left-color: var(--amber); }
  .card.v-deny { border-left-color: var(--red); }
  .card.fresh { animation: drop .6s ease; }
  @keyframes drop { 0%{ transform: translateY(-8px); background:#1d2740;} 100%{ transform: translateY(0); } }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .order { font-size: 13px; color: var(--muted); }
  .order b { color: var(--text); font-size: 15px; }
  .badge {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    padding: 4px 9px; border-radius: 999px; white-space: nowrap;
  }
  .badge.v-auto_approve { background: rgba(34,197,94,.15); color: var(--green); }
  .badge.v-escalate { background: rgba(245,158,11,.15); color: var(--amber); }
  .badge.v-deny { background: rgba(239,68,68,.15); color: var(--red); }

  .reason { font-size: 14px; margin: 12px 0 14px; color: var(--text); }

  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .score-row .lbl { font-size: 11px; color: var(--muted); width: 74px; }
  .bar { flex: 1; height: 7px; border-radius: 4px; background: var(--panel-2); overflow: hidden; }
  .bar > span { display: block; height: 100%; border-radius: 4px; }
  .score-val { font-size: 13px; font-weight: 700; width: 34px; text-align: right; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .chip {
    font-size: 11px; padding: 3px 8px; border-radius: 6px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
  }
  .chip.resale { color: var(--red); border-color: rgba(239,68,68,.4); }
  .chip.ok { color: var(--green); border-color: rgba(34,197,94,.35); }

  .evidence { display: flex; gap: 12px; }
  .evidence ul { margin: 0; padding-left: 16px; flex: 1; }
  .evidence li { font-size: 12.5px; color: var(--muted); margin-bottom: 5px; line-height: 1.35; }
  .thumb {
    width: 70px; height: 70px; border-radius: 9px; object-fit: cover;
    border: 1px solid var(--border); background: var(--panel-2); flex-shrink: 0;
  }
  .empty { color: var(--muted); text-align: center; padding: 60px 0; }
  footer { text-align: center; color: var(--muted); font-size: 11px; padding: 24px; }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">🛡️</div>
      <div>
        <h1>Pearl of the Atlantic · Returns Ops</h1>
        <p>Live fraud decisions — powered by ReturnGuard</p>
      </div>
    </div>
    <div class="stats" id="stats">
      <div class="stat"><div class="n" id="s-total">0</div><div class="l">Cases</div></div>
      <div class="stat approve"><div class="n" id="s-approve">0</div><div class="l">Approved</div></div>
      <div class="stat escalate"><div class="n" id="s-escalate">0</div><div class="l">Escalated</div></div>
      <div class="stat deny"><div class="n" id="s-deny">0</div><div class="l">Denied</div></div>
      <div class="live"><span class="dot"></span><span id="live-text">live</span></div>
    </div>
  </header>

  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">Waiting for the first decision…</div>
  </main>
  <footer>Voice: Vapi · Vision: Nebius · Web grounding: Apify · Backend: InsForge</footer>

<script>
  const FEED_URL = "https://zz3ntem9.us-east.insforge.app/functions/cases-feed";
  const POLL_MS = 3000;
  const seen = new Set();
  const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function timeAgo(iso) {
    const s = Math.max(0, (Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 60) return Math.floor(s) + "s ago";
    if (s < 3600) return Math.floor(s/60) + "m ago";
    if (s < 86400) return Math.floor(s/3600) + "h ago";
    return Math.floor(s/86400) + "d ago";
  }
  function scoreColor(v) { return v >= 0.6 ? "var(--red)" : v >= 0.3 ? "var(--amber)" : "var(--green)"; }

  function cardHTML(c, fresh) {
    const v = c.verdict || "escalate";
    const score = Number(c.fraud_score ?? 0);
    const reasons = Array.isArray(c.reasons) ? c.reasons : [];
    const domains = Array.isArray(c.resale_domains) ? c.resale_domains : [];
    const chips = [];
    if (c.resale_flag) domains.forEach(d => chips.push(`<span class="chip resale">resale: ${esc(d)}</span>`));
    if (c.variant_match === true) chips.push(`<span class="chip ok">variant match</span>`);
    if (c.variant_match === false) chips.push(`<span class="chip resale">variant mismatch</span>`);
    return `
      <div class="card v-${esc(v)} ${fresh ? "fresh" : ""}">
        <div class="card-top">
          <div class="order">order <b>#${esc(c.order_id)}</b><br><span>${timeAgo(c.created_at)}</span></div>
          <div class="badge v-${esc(v)}">${esc(v.replace("_"," "))}</div>
        </div>
        <div class="reason">"${esc(c.reason)}"</div>
        <div class="score-row">
          <span class="lbl">fraud score</span>
          <div class="bar"><span style="width:${Math.round(score*100)}%;background:${scoreColor(score)}"></span></div>
          <span class="score-val" style="color:${scoreColor(score)}">${score.toFixed(2)}</span>
        </div>
        ${chips.length ? `<div class="chips">${chips.join("")}</div>` : ""}
        <div class="evidence">
          <ul>${reasons.map(r => `<li>${esc(r)}</li>`).join("") || "<li>No evidence recorded.</li>"}</ul>
          ${c.photo_url ? `<img class="thumb" src="${esc(c.photo_url)}" alt="" onerror="this.style.display='none'">` : ""}
        </div>
      </div>`;
  }

  async function poll() {
    try {
      const res = await fetch(FEED_URL, { cache: "no-store" });
      const json = await res.json();
      const cases = Array.isArray(json.data) ? json.data : [];
      document.getElementById("live-text").textContent = "live";

      const grid = document.getElementById("grid");
      document.getElementById("empty").style.display = cases.length ? "none" : "block";

      const counts = { total: cases.length, auto_approve: 0, escalate: 0, deny: 0 };
      grid.innerHTML = cases.map(c => {
        if (counts[c.verdict] !== undefined) counts[c.verdict]++;
        const fresh = !seen.has(c.id);
        return cardHTML(c, fresh);
      }).join("");
      cases.forEach(c => seen.add(c.id));

      document.getElementById("s-total").textContent = counts.total;
      document.getElementById("s-approve").textContent = counts.auto_approve;
      document.getElementById("s-escalate").textContent = counts.escalate;
      document.getElementById("s-deny").textContent = counts.deny;
    } catch (e) {
      document.getElementById("live-text").textContent = "reconnecting…";
    }
  }
  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
